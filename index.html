function getPin(){return['p0','p1','p2','p3'].map(i=>document.getElementById(i).value).join('')}

async function doLogin(){
  const u=PINS[getPin()];
  if(!u){document.getElementById('login-err').style.display='block';['p0','p1','p2','p3'].forEach(i=>document.getElementById(i).value='');document.getElementById('p0').focus();return;}
  CU={...u};
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('tb-user').textContent=u.name+' · '+u.label+' · 🔄 Sincronizando...';
  await cargarAvancesRemotos();
  document.getElementById('tb-user').textContent=u.name+' · '+u.label+' · ☁️ En la nube';
  renderAll();
}

async function cargarAvancesRemotos(){
  try{
    const {data,error}=await supa.from('gantt_avances').select('*');
    if(error){console.error('Error Supabase:',error);return;}
    if(!data)return;
    data.forEach(row=>{
      const sec=DATA.sections.find(s=>s.id===row.seccion_id);
      if(!sec)return;
      const t=sec.tasks.find(x=>x.id===row.tarea_id);
      if(!t)return;
      t.prog=row.progreso;
      t.estado=row.estado;
      t.obs=row.observaciones;
    });
  }catch(e){console.error('Error cargando avances:',e);}
}

function doLogout(){CU=null;document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none';['p0','p1','p2','p3'].forEach(i=>document.getElementById(i).value='');}

function visSecs(){return CU.role==='admin'?DATA.sections:DATA.sections.filter(s=>s.roles.includes(CU.role));}
function allTasks(){return visSecs().flatMap(s=>s.tasks);}
function progColor(p){return p===100?'#27ae60':p>=60?'#db6017':p>=30?'#f39c12':'#e74c3c';}

function renderStats(){
  const t=allTasks(),total=t.length;
  const comp=t.filter(x=>x.prog===100).length;
  const hitos=t.filter(x=>x.tipo==='HITO');
  const hitosOK=hitos.filter(x=>x.prog===100).length;
  const avg=total?Math.round(t.reduce((s,x)=>s+x.prog,0)/total):0;
  const urg=t.filter(x=>x.prio==='URGENTE'&&x.prog<100).length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-label">Avance general</div><div class="stat-val">${avg}%</div><div class="stat-sub">${comp} de ${total} completadas</div></div>
    <div class="stat-card"><div class="stat-label">Hitos</div><div class="stat-val">${hitosOK}/${hitos.length}</div><div class="stat-sub">logrados</div></div>
    <div class="stat-card"><div class="stat-label">Urgentes pendientes</div><div class="stat-val" style="color:#c0392b">${urg}</div><div class="stat-sub">requieren atención inmediata</div></div>
    <div class="stat-card"><div class="stat-label">Actualizado</div><div class="stat-val" style="font-size:14px">${new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'})}</div><div class="stat-sub">última carga</div></div>`;
}

function renderLista(){
  let h='';
  visSecs().forEach(sec=>{
    const avg=sec.tasks.length?Math.round(sec.tasks.reduce((s,t)=>s+t.prog,0)/sec.tasks.length):0;
    h+=`<div class="section-card">
      <div class="section-header">
        <div class="sec-dot" style="background:${sec.color}"></div>
        <div class="sec-name">${sec.name}</div>
        <div class="sec-pct">${avg}% avance</div>
      </div>`;
    if(sec.nota){h+=`<div class="nota-cell">⚑ ${sec.nota}</div>`;}
    h+=`<table class="tasks-table"><thead><tr>
        <th style="width:32px">#</th><th>Tarea</th><th style="width:130px">Responsable</th>
        <th style="width:88px">Inicio</th><th style="width:48px">Días</th>
        <th style="width:72px">Tipo</th><th style="width:72px">Prioridad</th>
        <th style="width:130px">Avance</th><th style="width:64px"></th>
      </tr></thead><tbody>`;
    sec.tasks.forEach(t=>{
      const tc=t.tipo==='HITO'?'t-hito':t.tipo==='ENTREGABLE'?'t-ent':'t-act';
      const pc=t.prio==='URGENTE'?'p-u':t.prio==='ALTA'?'p-a':'p-m';
      const canEdit=CU.role==='admin'||sec.roles.includes(CU.role);
      h+=`<tr>
        <td style="color:#aaa;font-size:10px">${t.id}</td>
        <td><div style="font-size:12px">${t.tipo==='HITO'?'♦ ':''}${t.desc}</div>${t.obs?`<div style="font-size:10px;color:#888;font-style:italic;margin-top:2px">${t.obs}</div>`:''}</td>
        <td style="font-size:11px;color:#666">${t.asign}</td>
        <td style="font-size:11px;color:#666">${t.start}</td>
        <td style="font-size:11px;color:#666;text-align:center">${t.dias}</td>
        <td><span class="tipo-badge ${tc}">${t.tipo}</span></td>
        <td><span class="prio-badge ${pc}">${t.prio}</span></td>
        <td><div style="display:flex;align-items:center;gap:6px"><div class="prog-bar"><div class="prog-fill" style="width:${t.prog}%;background:${progColor(t.prog)}"></div></div><span style="font-size:11px;font-weight:700;color:${progColor(t.prog)}">${t.prog}%</span></div></td>
        <td>${canEdit?`<button class="edit-btn" onclick="openModal(${t.id},'${sec.id}')">Editar</button>`:''}</td>
      </tr>`;
    });
    h+=`</tbody></table></div>`;
  });
  document.getElementById('view-lista').innerHTML=h;
}

function renderGantt(){
  const start=new Date('2026-04-13'),totalDays=210;
  const months=[];
  for(let i=0;i<7;i++){const d=new Date(start);d.setMonth(d.getMonth()+i);months.push(d.toLocaleDateString('es-MX',{month:'short',year:'2-digit'}).toUpperCase());}
  function pct(ds,d){return Math.max(0,(new Date(ds)-start)/(1000*60*60*24))/totalDays*100;}
  let h=`<div class="gantt-wrap"><div style="min-width:900px">
    <div class="gantt-header-row"><div class="gh-name">Tarea</div><div class="gh-months">`;
  months.forEach(m=>{h+=`<div class="month-col">${m}</div>`;});
  h+=`</div></div>`;
  visSecs().forEach(sec=>{
    h+=`<div class="gantt-sec-row"><div class="gantt-sec-label" style="color:${sec.color}">${sec.name}</div><div style="flex:1;min-width:600px"></div></div>`;
    sec.tasks.forEach(t=>{
      const off=pct(t.start,0);
      const w=t.dias/totalDays*100;
      const fw=w*t.prog/100;
      h+=`<div class="gantt-task-row">
        <div class="gt-name" title="${t.desc}">${t.tipo==='HITO'?'♦ ':''}<span>${t.desc.substring(0,42)}${t.desc.length>42?'…':''}</span></div>
        <div class="gt-bars">`;
      if(t.tipo==='HITO'){
        h+=`<div class="gt-hito" style="left:calc(${off}% - 6px);background:${sec.color}"></div>`;
      } else {
        h+=`<div class="gt-bar-bg" style="left:${off}%;width:${w}%;background:${sec.color}18;border:1px solid ${sec.color}40"></div>`;
        h+=`<div class="gt-bar-fill" style="left:${off}%;width:${fw}%;background:${progColor(t.prog)}99"></div>`;
      }
      h+=`</div></div>`;
    });
  });
  h+=`</div></div>`;
  document.getElementById('view-gantt').innerHTML=h;
}

function switchView(v){
  document.getElementById('view-lista').style.display=v==='lista'?'block':'none';
  document.getElementById('view-gantt').style.display=v==='gantt'?'block':'none';
  document.getElementById('tab-lista').className='view-tab'+(v==='lista'?' active':'');
  document.getElementById('tab-gantt').className='view-tab'+(v==='gantt'?' active':'');
  if(v==='gantt')renderGantt();
}

function openModal(tid,sid){
  const sec=DATA.sections.find(s=>s.id===sid);
  const t=sec.tasks.find(x=>x.id===tid);
  editCtx={tid,sid};
  document.getElementById('m-title').textContent=t.desc;
  document.getElementById('m-meta').textContent='Responsable: '+t.asign+' · Inicio: '+t.start+' · '+t.dias+' días';
  document.getElementById('m-prog').value=t.prog;
  document.getElementById('m-pv').textContent=t.prog+'%';
  document.getElementById('m-estado').value=t.estado||'Según lo previsto';
  document.getElementById('m-obs').value=t.obs||'';
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');editCtx=null;}

async function saveModal(){
  if(!editCtx)return;
  const sec=DATA.sections.find(s=>s.id===editCtx.sid);
  const t=sec.tasks.find(x=>x.id===editCtx.tid);
  t.prog=parseInt(document.getElementById('m-prog').value);
  t.estado=document.getElementById('m-estado').value;
  t.obs=document.getElementById('m-obs').value;
  if(t.prog===100)t.estado='Completado';

  // Guardar en Supabase
  const btnSave=document.querySelector('.btn-save');
  const btnTextOriginal=btnSave.textContent;
  btnSave.textContent='Guardando...';
  btnSave.disabled=true;
  try{
    const {error}=await supa.from('gantt_avances').upsert({
      tarea_id:t.id,
      seccion_id:sec.id,
      progreso:t.prog,
      estado:t.estado,
      observaciones:t.obs,
      modificado_por:CU.name,
      actualizado_en:new Date().toISOString()
    },{onConflict:'tarea_id,seccion_id'});
    if(error){
      alert('Error al guardar en la nube: '+error.message+'\n\nEl cambio se guardó localmente pero NO se sincronizó. Revisa tu conexión e intenta de nuevo.');
      btnSave.textContent=btnTextOriginal;
      btnSave.disabled=false;
      return;
    }
  }catch(e){
    alert('Error de conexión: '+e.message);
    btnSave.textContent=btnTextOriginal;
    btnSave.disabled=false;
    return;
  }
  btnSave.textContent=btnTextOriginal;
  btnSave.disabled=false;
  closeModal();renderAll();
}

function renderAll(){renderStats();renderLista();}

async function refrescarDesdeNube(){
  document.getElementById('tb-user').textContent=CU.name+' · '+CU.label+' · 🔄 Sincronizando...';
  await cargarAvancesRemotos();
  document.getElementById('tb-user').textContent=CU.name+' · '+CU.label+' · ☁️ En la nube';
  renderAll();
}

document.querySelectorAll('.pin-digit').forEach((el,i,arr)=>{
  el.addEventListener('input',()=>{if(el.value&&i<arr.length-1)arr[i+1].focus();});
  el.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();if(e.key==='Backspace'&&!el.value&&i>0)arr[i-1].focus();});
});
